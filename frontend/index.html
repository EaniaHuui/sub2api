<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodexOne - AI API Gateway | GPT/Claude/Codex 中转服务</title>
    <meta name="description" content="CodexOne 提供稳定的 GPT、Claude Code、Codex、Gemini 等 AI 模型 API 中转服务，高速稳定，无需翻墙。">
    <meta name="keywords" content="GPT API, Claude Code, Codex, API中转, AI Gateway, OpenAI API代理, GPT中转, Claude中转">
    <meta name="robots" content="index, follow">
    <meta name="author" content="CodexOne">
    <!-- Open Graph / Social -->
    <meta property="og:title" content="CodexOne - AI API Gateway | GPT/Claude/Codex 中转服务">
    <meta property="og:description" content="稳定的 AI 模型 API 中转服务，高速稳定，无需翻墙。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CodexOne">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CodexOne - AI API Gateway">
    <meta name="twitter:description" content="稳定的 AI 模型 API 中转服务，高速稳定，无需翻墙。">
    <!-- Dynamic canonical URL (injected at runtime) -->
    <script>
      (function() {
        var domain = window.location.origin;
        // Canonical URL
        var link = document.createElement('link');
        link.rel = 'canonical';
        link.href = domain;
        document.head.appendChild(link);
        // OG URL
        var meta = document.createElement('meta');
        meta.property = 'og:url';
        meta.content = domain;
        document.head.appendChild(meta);
        // Twitter URL
        var twitterUrl = document.createElement('meta');
        twitterUrl.name = 'twitter:url';
        twitterUrl.content = domain;
        document.head.appendChild(twitterUrl);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
