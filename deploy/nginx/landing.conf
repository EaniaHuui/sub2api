# Standalone CodexOne landing site on a dedicated domain.
# The main application remains on codexone.aieania.tech.

server {
    listen 80;
    server_name codex.aieania.tech;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name codex.aieania.tech;

    ssl_certificate /etc/letsencrypt/live/codex.aieania.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codex.aieania.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/codexone-landing/dist;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /en {
        try_files /en/index.html =404;
    }

    location /_astro/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /og/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /brand-icon.png {
        try_files /brand-icon.png =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /favicon.svg {
        try_files /favicon.svg =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap-index.xml {
        try_files /sitemap-index.xml =404;
    }

    location = /sitemap-0.xml {
        try_files /sitemap-0.xml =404;
    }

    location / {
        return 404;
    }
}
